<!DOCTYPE html>
<html>
<head>
    <title>Vehicle AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap; /* 👈 allows second row */
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(56,189,248,0.4);
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(56,189,248,0.8);
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.2), transparent);
            filter: blur(120px);
            z-index: -1;
            animation: moveGlow 8s infinite alternate;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes moveGlow {
            from {transform: translate(-100px, -100px);}
            to {transform: translate(100px, 100px);}
        }
    </style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <h1>🚗 Vehicle AI System</h1>
    <p>Real-time vehicle classification with intelligent decision system</p>

    <div class="btn-group">
        <div class="btn" onclick="goUpload()">Upload Image</div>
        <div class="btn" onclick="goLive()">Live Camera</div>

        <!-- 🔥 ADDED BUTTONS -->
        <div class="btn" onclick="goAbout()">About</div>
        <div class="btn" onclick="goEngineering()">Engineering</div>
    </div>

</div>

<script>
function goUpload() {
    window.location.href = "/upload";
}

function goLive() {
    window.location.href = "/live";
}

/* 🔥 ADDED FUNCTIONS */
function goAbout() {
    window.location.href = "/about";
}

function goEngineering() {
    window.location.href = "/engineering";
}
</script>

</body>
</html>
