<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(30,41,59,0.85);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 420px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .bar-container {
            background: #334155;
            border-radius: 10px;
        }

        .bar {
            height: 20px;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .alert {
            color: red;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes blink {
            0%,100% {opacity: 1;}
            50% {opacity: 0.3;}
        }
    </style>
</head>

<body>

<div class="card">

    <img src="{{ image_path }}">

    <h2>{{ result.class.upper() }}</h2>

    <div class="bar-container">
        <div class="bar" id="bar"></div>
    </div>

    <p>{{ (result.confidence * 100)|round(2) }}%</p>
    <p>{{ result.decision }}</p>

    {% if result.class == "ambulance" %}
        <p class="alert">🚨 EMERGENCY DETECTED 🚨</p>
    {% endif %}

    <button onclick="window.location.href='/upload'">Try Another</button>

</div>

<script>
const confidence = {{ result.confidence }};
const label = "{{ result.class }}";

// animate bar
setTimeout(() => {
    document.getElementById("bar").style.width = (confidence * 100) + "%";
}, 100);

// preload sound
const ambulanceSound = new Audio("/static/sounds/ambulance.mp3");

// play audio
function playSound() {
    window.speechSynthesis.cancel();

    if (label === "ambulance") {
        ambulanceSound.currentTime = 0;
        ambulanceSound.play().catch(err => console.log(err));
    } else {
        const speech = new SpeechSynthesisUtterance(label);
        speech.rate = 1;
        speech.pitch = 1.2;
        speechSynthesis.speak(speech);
    }
}

// ensure browser allows audio
document.body.addEventListener("click", () => {
    playSound();
}, { once: true });

// auto trigger after load (may fail without interaction)
setTimeout(playSound, 500);
</script>

</body>
</html>
